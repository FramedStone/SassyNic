<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SassyNic</title>
    <link rel="stylesheet" href="popup.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="title-wrapper">
          <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
            <img src="/extension/images/icon/icon128.png" alt="Left Icon" class="left-icon" />
          </a>
          <h1>SassyNic</h1>
        </div>
        <a href="https://hackerspacemmu.rocks/" target="_blank">
          <img src="/extension/images/logo/hackerspace.png" alt="Right Icon" class="right-icon" />
        </a>
      </header>
      <main>
        <!-- Useful Buttons -->
        <button id="btnErrorCode">Error Code Reference</button>
        <button id="btnWiki">Wiki</button>
        <button id="btnRoadMap">Roadmap</button>
        <button id="btnFeedback">Feedback Form</button>
        <br /><br />

        <!-- Timetable Tools -->
        <details class="dropdown" id="timetableDropdown">
          <summary>Timetable</summary>
          <div class="dropdown-content">
            <details class="dropdown nested-dropdown" id="termToExtractDropdown">
              <summary>Term to extract</summary>
              <div class="dropdown-content" id="termSelection">
                <p id="termLoadingMsg">Loading terms...</p>
              </div>
            </details>
          </div>
        </details>
      </main>
    </div>
    <script type="module" src="popup.js" defer></script>
  </body>
</html>
